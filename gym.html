<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<title>Fitness</title>
<script src="topbar.js" defer></script>

<style>
:root {
  --bg: #0a0a0b;
  --bg-card: #111113;
  --text-1: #ffffff;
  --text-2: rgba(255,255,255,0.6);
  --text-3: rgba(255,255,255,0.4);
  --text-4: rgba(255,255,255,0.25);
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.14);
  --good: #6ee7b7;
  --warn: #fbbf24;
  --bad: #ff8a8a;
  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  --font-mono: ui-monospace, SF Mono, Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, #14141a 0%, #0a0a0b 60%);
  color: var(--text-1);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  min-height: 100vh;
  overflow-x: hidden;
  width: 100%;
  max-width: 100vw;
}
.fitness-shell {
  width: 100%; max-width: min(720px, 100vw);
  margin: 0 auto;
  padding: 24px max(16px, env(safe-area-inset-right)) calc(40px + env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
  box-sizing: border-box;
  min-width: 0;
}
.fitness-shell * { min-width: 0; }
img, video, canvas, svg { max-width: 100%; }

/* ============================================================
   WEIGHT TRACKER + PROGRESS PHOTOS
   ============================================================ */
.wt-section { margin-bottom: 22px; }
.wt-divider {
  display: flex; align-items: center; gap: 16px; margin-bottom: 14px;
}
.wt-divider::before, .wt-divider::after {
  content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.10);
}
.wt-divider span {
  font-size: 11px; letter-spacing: 0.22em; font-weight: 600;
  color: rgba(255,255,255,0.85);
}
.wt-card {
  background: var(--bg-card);
  border: 1px solid rgba(110,231,183,0.10);
  border-radius: 18px;
  padding: 22px 20px 18px;
}
.wt-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
.wt-num {
  font-size: 48px; font-weight: 600; letter-spacing: -0.025em;
  line-height: 1; font-variant-numeric: tabular-nums;
}
.wt-unit { font-size: 16px; color: var(--text-3); }
.wt-delta {
  font-size: 13px; font-weight: 500; margin-bottom: 14px;
  font-variant-numeric: tabular-nums;
}
.wt-delta.up   { color: var(--warn); }
.wt-delta.down { color: var(--good); }
.wt-streak {
  color: var(--good); font-size: 13px; font-weight: 500;
  margin-bottom: 14px;
  display: inline-flex; align-items: center; gap: 6px;
}
.wt-empty {
  text-align: center; padding: 28px 16px;
  color: var(--text-3); font-size: 13px;
  border: 1px dashed var(--border);
  border-radius: 12px; margin-bottom: 4px;
}

.wt-chart-wrap { position: relative; margin: 16px 0 8px; }
.wt-chart-yaxis {
  position: absolute; left: 0; top: 0; bottom: 0; width: 36px;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 4px 0;
}
.wt-chart-yaxis span {
  font-size: 10px; color: var(--text-4);
  font-family: var(--font-mono);
}
.wt-chart {
  height: 130px; display: block;
  margin-left: 36px; width: calc(100% - 36px);
}
.wt-grid { stroke: rgba(255,255,255,0.05); stroke-width: 1; }
.wt-area { fill: url(#wtFill); }
.wt-line { fill: none; stroke: var(--good); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.wt-avg-line { fill: none; stroke: rgba(110,231,183,0.45); stroke-width: 1.5; stroke-dasharray: 4 3; opacity: 0.6; }
.wt-dot { fill: var(--good); stroke: var(--bg-card); stroke-width: 1.5; }
.wt-dot-today { fill: #fff; stroke: var(--good); stroke-width: 2; }
.wt-meta {
  text-align: center; font-size: 11px; color: var(--text-3);
  margin-top: 8px;
}
.wt-legend {
  display: flex; justify-content: center; gap: 18px; margin-top: 10px;
}
.wt-legend-item {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 10px; letter-spacing: 0.18em; font-weight: 600;
  color: var(--text-3);
}
.wt-legend-dot {
  width: 14px; height: 2px; background: var(--good); border-radius: 1px;
}
.wt-legend-dot-avg {
  background: transparent; border-top: 2px dashed rgba(110,231,183,0.45);
  height: 2px;
}

/* Range tabs */
.wt-range-tabs {
  display: flex; gap: 4px; margin-bottom: 10px;
}
.wt-range-tab {
  padding: 5px 14px; border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-3); font-family: var(--font-mono);
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.wt-range-tab:hover { color: var(--text-2); border-color: var(--border-strong); }
.wt-range-tab.active {
  background: rgba(110,231,183,0.10);
  border-color: rgba(110,231,183,0.35);
  color: var(--good);
}
.wt-range-empty {
  text-align: center; padding: 22px 16px;
  color: var(--text-4); font-size: 12px;
  font-family: var(--font-mono); letter-spacing: 0.06em;
}

/* Locked state */
.wt-locked {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(110,231,183,0.04);
  border: 1px solid rgba(110,231,183,0.16);
  border-radius: 12px; padding: 12px 14px; margin-top: 14px;
}
.wt-locked-info { display: flex; align-items: center; gap: 12px; }
.wt-locked-check {
  width: 30px; height: 30px;
  background: rgba(110,231,183,0.12);
  color: var(--good);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}
.wt-locked-label {
  font-size: 10px; letter-spacing: 0.16em; font-weight: 600;
  color: var(--text-3); margin-bottom: 2px;
}
.wt-locked-value { font-size: 16px; font-weight: 600; }
.wt-edit-btn {
  background: transparent; border: none; color: var(--good);
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; padding: 6px 10px;
  -webkit-tap-highlight-color: transparent;
}

/* Input row */
.wt-input-row { margin-top: 14px; }
.wt-input-top {
  display: grid; grid-template-columns: 1fr auto auto;
  align-items: center; gap: 10px;
}
.wt-input {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-1);
  font-family: inherit; font-size: 16px; font-weight: 500;
  padding: 11px 13px; width: 100%; outline: none;
}
.wt-input:focus { border-color: rgba(110,231,183,0.4); }
.wt-unit-static { color: var(--text-3); font-size: 13px; }
.wt-save-btn {
  background: var(--good); color: #000;
  border: none; border-radius: 10px;
  padding: 11px 18px; font-family: inherit;
  font-size: 13px; font-weight: 700; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* Progress link */
.wt-progress-link {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-card);
  border: 1px solid rgba(110,231,183,0.10);
  border-radius: 16px;
  padding: 18px 20px;
  color: var(--text-1);
  margin-top: 12px; cursor: pointer; width: 100%;
  font-family: inherit; text-align: left;
  transition: border-color 0.2s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.wt-progress-link:hover { border-color: rgba(110,231,183,0.25); }
.wt-progress-link:active { transform: scale(0.99); }
.wt-progress-label {
  font-size: 11px; letter-spacing: 0.20em; font-weight: 600;
  color: var(--text-3); margin-bottom: 4px;
}
.wt-progress-count { font-size: 14px; font-weight: 500; }
.wt-progress-arrow { color: var(--good); font-size: 20px; }

/* Overlay */
.wt-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 100; overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
}
.wt-overlay.is-open { transform: translateY(0); }
.wt-overlay-inner {
  max-width: 720px; margin: 0 auto;
  padding: 24px 20px 40px;
}
.wt-overlay-h {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 22px;
}
.wt-back {
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text-1); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.wt-overlay-title {
  font-size: 26px; font-weight: 600; letter-spacing: -0.015em;
}
.wt-overlay-actions {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 22px;
}
.wt-overlay-action {
  height: 50px; border-radius: 12px; border: none;
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.wt-overlay-primary { background: var(--good); color: #000; }
.wt-overlay-secondary {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text-1);
}
.wt-photo-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.wt-photo-empty {
  grid-column: 1 / -1; text-align: center;
  padding: 50px 20px; color: var(--text-3); font-size: 13px;
}
.wt-photo-card {
  position: relative; aspect-ratio: 3 / 4;
  border-radius: 12px; overflow: hidden;
  background: linear-gradient(135deg, #1a1a24, #0a0f0a);
  cursor: pointer; border: 1px solid rgba(110,231,183,0.08);
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.wt-photo-card.is-removing { opacity: 0; transform: scale(0.92); transition: 0.25s; }
.wt-photo-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.wt-photo-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.7) 100%); pointer-events: none; }
.wt-photo-meta {
  position: absolute; left: 0; right: 0; bottom: 0;
  padding: 12px 14px;
  display: flex; justify-content: space-between; align-items: flex-end;
  font-size: 12px; font-weight: 500;
}
.wt-photo-date { color: var(--good); }
.wt-photo-weight { color: var(--text-1); }

/* Camera modal */
.wt-cam {
  position: fixed; inset: 0; background: #000; z-index: 300;
  display: none; flex-direction: column;
}
.wt-cam.is-open { display: flex; }
.wt-cam-stage {
  flex: 1; display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.wt-cam-video {
  width: 100%; height: 100%; object-fit: cover; background: #000;
}
.wt-cam-actions {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 28px calc(24px + env(safe-area-inset-bottom));
  background: #000;
}
.wt-cam-btn {
  background: transparent; border: none; color: var(--text-1);
  font-family: inherit; font-size: 14px; font-weight: 500;
  cursor: pointer; padding: 10px; min-width: 60px;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.wt-cam-shutter {
  width: 64px; height: 64px; border-radius: 50%;
  background: #fff;
  border: 4px solid rgba(255,255,255,0.3);
  box-shadow: 0 0 0 2px #fff inset;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.wt-cam-shutter:active { transform: scale(0.92); }

/* Photo viewer */
.wt-viewer {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.96); z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
  display: flex; flex-direction: column;
  padding: 24px 16px;
}
.wt-viewer.is-open { opacity: 1; pointer-events: auto; }
.wt-viewer-stage {
  flex: 1; display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.wt-viewer-meta {
  text-align: center; padding: 16px 0 8px;
}
.wt-viewer-date {
  color: var(--good); font-size: 11px; letter-spacing: 0.18em;
  font-weight: 600; margin-bottom: 4px;
}
.wt-viewer-weight {
  color: var(--text-1); font-size: 20px; font-weight: 600;
}
.wt-viewer-actions {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.wt-viewer-btn {
  background: transparent; border: 1px solid var(--border);
  font-family: inherit; font-size: 14px; font-weight: 500;
  padding: 12px; cursor: pointer; border-radius: 10px;
  -webkit-tap-highlight-color: transparent;
}
.wt-viewer-close { color: var(--text-1); }
.wt-viewer-delete { color: var(--bad); border-color: rgba(248,113,113,0.3); }
.wt-viewer-delete.is-confirm { background: rgba(248,113,113,0.10); }
.wt-viewer-compare { color: var(--good); border-color: rgba(110,231,183,0.30); }
.wt-viewer-back    { color: var(--good); border-color: rgba(110,231,183,0.30); }

.wt-viewer .wt-viewer-single,
.wt-viewer .wt-viewer-compare-view {
  display: none;
  flex-direction: column; flex: 1; min-height: 0;
}
.wt-viewer[data-mode="single"]  .wt-viewer-single        { display: flex; }
.wt-viewer[data-mode="compare"] .wt-viewer-compare-view  { display: flex; }

.wt-compare-stage {
  flex: 1; display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px; min-height: 0;
  align-items: stretch;
}
.wt-compare-side {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 0; min-width: 0;
  background: transparent;
  border: none; padding: 0; cursor: default;
  font-family: inherit;
}
.wt-compare-side img {
  max-width: 100%; max-height: calc(100% - 28px);
  object-fit: contain; border-radius: 6px;
}
.wt-compare-meta-line {
  margin-top: 6px;
  font-size: 12px; color: var(--text-3);
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.wt-compare-other { cursor: pointer; -webkit-tap-highlight-color: transparent; }
.wt-compare-other:hover img { outline: 1px solid rgba(110,231,183,0.30); }
.wt-compare-headline {
  text-align: center; padding: 14px 8px 12px;
  font-size: 14px; font-weight: 600;
  color: var(--good);
  font-variant-numeric: tabular-nums;
}
.wt-compare-headline.up   { color: var(--warn); }
.wt-compare-headline.down { color: var(--good); }
.wt-compare-headline.flat { color: var(--text-2); }

@media (max-width: 480px) {
  .fitness-shell { padding: 14px max(10px, env(safe-area-inset-right)) calc(32px + env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left)); }
  .wt-photo-grid { gap: 8px; }
  .wt-compare-stage { gap: 4px; }
  .wt-compare-meta-line { font-size: 11px; }
}

/* Personal Bests */
.pb-card {
  background: var(--bg-card);
  border: 1px solid rgba(251,191,36,0.10);
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 22px;
}
.pb-empty {
  text-align: center; padding: 28px 16px;
  color: var(--text-3); font-size: 13px;
}
.pb-list { padding: 4px 0 0; }
.pb-row {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
}
.pb-row:last-child { border-bottom: none; }
.pb-row-info { flex: 1; min-width: 0; }
.pb-exercise {
  font-size: 14px; font-weight: 600; color: var(--text-1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px;
}
.pb-lift {
  font-size: 12px; color: var(--text-3);
  font-variant-numeric: tabular-nums;
}
.pb-orm {
  font-size: 13px; font-weight: 600; color: var(--warn);
  font-variant-numeric: tabular-nums;
  white-space: nowrap; flex-shrink: 0;
}
.pb-delete {
  background: transparent; border: none;
  color: var(--text-4); cursor: pointer;
  padding: 6px 4px; border-radius: 6px; font-size: 13px; line-height: 1;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s;
}
.pb-delete:hover { color: var(--bad); }
.pb-add-btn {
  display: block; width: 100%; padding: 14px;
  background: transparent; border: none;
  border-top: 1px solid var(--border);
  color: var(--text-3);
  font-family: inherit; font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.14s, color 0.14s;
}
.pb-add-btn:hover { background: rgba(255,255,255,0.03); color: var(--text-2); }

/* PB Modal */
.pb-modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.72); backdrop-filter: blur(10px);
  z-index: 150; align-items: center; justify-content: center; padding: 24px;
}
.pb-modal-bg.is-open { display: flex; }
.pb-modal {
  width: 100%; max-width: 360px;
  background: #111113;
  border: 1px solid var(--border-strong);
  border-radius: 18px; padding: 24px;
}
.pb-modal-title {
  font-size: 18px; font-weight: 700; color: var(--text-1); margin-bottom: 20px;
}
.pb-field { margin-bottom: 14px; }
.pb-label {
  display: block; font-size: 10px; letter-spacing: 0.18em;
  font-weight: 600; color: var(--text-3); margin-bottom: 6px;
}
.pb-input {
  width: 100%; padding: 11px 13px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px; color: var(--text-1);
  font-family: inherit; font-size: 15px; outline: none;
  transition: border-color 0.15s;
}
.pb-input:focus { border-color: rgba(251,191,36,0.45); }
.pb-input::placeholder { color: var(--text-4); }
.pb-modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.pb-modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.pb-modal-cancel {
  flex: 1; padding: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text-1); font-family: inherit;
  font-size: 14px; font-weight: 600; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.14s;
}
.pb-modal-cancel:hover { background: rgba(255,255,255,0.08); }
.pb-modal-save {
  flex: 1; padding: 12px;
  background: rgba(251,191,36,0.14);
  border: 1px solid rgba(251,191,36,0.35); border-radius: 10px;
  color: var(--warn); font-family: inherit;
  font-size: 14px; font-weight: 700; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.14s;
}
.pb-modal-save:hover { background: rgba(251,191,36,0.24); }

@media (max-width: 480px) {
  .pb-modal-bg { padding: 12px; align-items: flex-end; }
  .pb-modal { border-radius: 18px 18px 12px 12px; }
}

.hidden { display: none !important; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="fitness-shell">

  <!-- WEIGHT + PROGRESS PHOTOS -->
  <div class="wt-section">
    <div class="wt-divider"><span>WEIGHT</span></div>

    <div class="wt-card">
      <div class="wt-row">
        <span class="wt-num" id="wtNum">—</span>
        <span class="wt-unit" id="wtUnit">kg</span>
      </div>
      <div class="wt-delta hidden" id="wtDelta"></div>
      <div class="wt-streak hidden" id="wtStreak">🔥<span id="wtStreakNum">0 day streak</span></div>

      <div class="wt-empty" id="wtEmpty">Log your first weight to start tracking.</div>

      <div class="wt-range-tabs hidden" id="wtRangeTabs">
        <button class="wt-range-tab" data-range="W">W</button>
        <button class="wt-range-tab active" data-range="M">M</button>
        <button class="wt-range-tab" data-range="Y">Y</button>
      </div>

      <div class="wt-chart-wrap hidden" id="wtChartWrap">
        <div class="wt-chart-yaxis">
          <span id="wtYAxisMax">—</span>
          <span id="wtYAxisMin">—</span>
        </div>
        <svg class="wt-chart" viewBox="0 0 320 130" preserveAspectRatio="none">
          <defs>
            <linearGradient id="wtFill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
            </linearGradient>
            <filter id="wtGlow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <line class="wt-grid" x1="0" y1="20" x2="320" y2="20"></line>
          <line class="wt-grid" x1="0" y1="65" x2="320" y2="65"></line>
          <line class="wt-grid" x1="0" y1="110" x2="320" y2="110"></line>
          <g id="wtChartContent"></g>
        </svg>
        <div class="wt-meta" id="wtMeta">0 entries</div>
      </div>

      <div class="wt-legend hidden" id="wtLegend">
        <span class="wt-legend-item"><span class="wt-legend-dot"></span>DAILY</span>
        <span class="wt-legend-item"><span class="wt-legend-dot wt-legend-dot-avg"></span>7-DAY AVG</span>
      </div>

      <div class="wt-locked hidden" id="wtLocked">
        <div class="wt-locked-info">
          <span class="wt-locked-check">✓</span>
          <div>
            <div class="wt-locked-label">LOGGED TODAY</div>
            <div class="wt-locked-value" id="wtLockedValue">— kg</div>
          </div>
        </div>
        <button class="wt-edit-btn" id="wtEditBtn">Edit</button>
      </div>

      <div class="wt-input-row" id="wtInputRow">
        <div class="wt-input-top">
          <input type="number" step="0.1" class="wt-input" id="wtInput" placeholder="Enter weight" inputmode="decimal" aria-label="Today's weight">
          <span class="wt-unit-static" id="wtUnitStatic">kg</span>
          <button class="wt-save-btn" id="wtSaveBtn">Save</button>
        </div>
      </div>
    </div>

    <button class="wt-progress-link" id="wtProgressLink" type="button" aria-label="Open progress photos">
      <div>
        <div class="wt-progress-label">PROGRESS PHOTOS</div>
        <div class="wt-progress-count" id="wtProgressCount">0 photos</div>
      </div>
      <span class="wt-progress-arrow">→</span>
    </button>
  </div>

  <!-- PERSONAL BESTS -->
  <div class="wt-divider"><span>PERSONAL BESTS</span></div>
  <div class="pb-card" id="pbCard">
    <div class="pb-empty" id="pbEmpty">No personal bests yet — tap Add to log one</div>
    <div class="pb-list hidden" id="pbList"></div>
    <button class="pb-add-btn" id="pbAddBtn" type="button">+ Add personal best</button>
  </div>

  <!-- PB Modal -->
  <div class="pb-modal-bg" id="pbModalBg">
    <div class="pb-modal">
      <div class="pb-modal-title">New Personal Best</div>
      <div class="pb-field">
        <label class="pb-label" for="pbExercise">EXERCISE</label>
        <input type="text" id="pbExercise" class="pb-input" placeholder="e.g. Bench Press" autocomplete="off" spellcheck="false">
      </div>
      <div class="pb-modal-row">
        <div class="pb-field">
          <label class="pb-label" for="pbWeight">WEIGHT (kg)</label>
          <input type="number" id="pbWeight" class="pb-input" placeholder="100" inputmode="decimal" step="0.5" min="0">
        </div>
        <div class="pb-field">
          <label class="pb-label" for="pbReps">REPS</label>
          <input type="number" id="pbReps" class="pb-input" placeholder="5" inputmode="numeric" min="1" max="36">
        </div>
      </div>
      <div class="pb-modal-actions">
        <button class="pb-modal-cancel" id="pbModalCancel" type="button">Cancel</button>
        <button class="pb-modal-save" id="pbModalSave" type="button">Save</button>
      </div>
    </div>
  </div>

  <!-- Progress photos overlay -->
  <div class="wt-overlay" id="wtOverlay" aria-hidden="true">
    <div class="wt-overlay-inner">
      <div class="wt-overlay-h">
        <button class="wt-back" id="wtBack" aria-label="Back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="wt-overlay-title">Progress</div>
      </div>
      <div class="wt-overlay-actions">
        <button class="wt-overlay-action wt-overlay-primary" id="wtTakePhotoBtn">Take Photo</button>
        <button class="wt-overlay-action wt-overlay-secondary" id="wtFromLibraryBtn">From Library</button>
      </div>
      <input type="file" id="wtFileCamera" accept="image/*" capture="environment" style="display:none">
      <input type="file" id="wtFileLibrary" accept="image/*" style="display:none">
      <div class="wt-photo-grid" id="wtPhotoGrid">
        <div class="wt-photo-empty">No photos yet · tap Take Photo to start</div>
      </div>
    </div>
  </div>

  <!-- Camera modal -->
  <div class="wt-cam" id="wtCam" aria-hidden="true">
    <div class="wt-cam-stage">
      <video class="wt-cam-video" id="wtCamVideo" autoplay playsinline muted></video>
      <canvas id="wtCamCanvas" style="display:none"></canvas>
    </div>
    <div class="wt-cam-actions">
      <button class="wt-cam-btn" id="wtCamCancel">Cancel</button>
      <button class="wt-cam-shutter" id="wtCamShutter" aria-label="Capture"></button>
      <button class="wt-cam-btn" id="wtCamFlip" aria-label="Flip camera">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      </button>
    </div>
  </div>

  <!-- Photo viewer -->
  <div class="wt-viewer" id="wtViewer" data-mode="single" aria-hidden="true">

    <!-- SINGLE MODE -->
    <div class="wt-viewer-single">
      <div class="wt-viewer-stage">
        <img id="wtViewerImg" alt="" style="max-width:100%; max-height:100%; object-fit:contain;">
      </div>
      <div class="wt-viewer-meta">
        <div class="wt-viewer-date" id="wtViewerDate">—</div>
        <div class="wt-viewer-weight" id="wtViewerWeight">—</div>
      </div>
      <div class="wt-viewer-actions">
        <button class="wt-viewer-btn wt-viewer-compare" id="wtViewerCompare">Compare</button>
        <button class="wt-viewer-btn wt-viewer-close" id="wtViewerClose">Close</button>
        <button class="wt-viewer-btn wt-viewer-delete" id="wtViewerDelete">Delete</button>
      </div>
    </div>

    <!-- COMPARE MODE -->
    <div class="wt-viewer-compare-view">
      <div class="wt-compare-stage">
        <div class="wt-compare-side" id="wtCmpSideA">
          <img id="wtCmpImgA" alt="">
          <div class="wt-compare-meta-line" id="wtCmpMetaA">—</div>
        </div>
        <button type="button" class="wt-compare-side wt-compare-other" id="wtCmpSideB" title="Tap to compare to a different photo" aria-label="Compare to a different photo">
          <img id="wtCmpImgB" alt="">
          <div class="wt-compare-meta-line" id="wtCmpMetaB">—</div>
        </button>
      </div>
      <div class="wt-compare-headline" id="wtCompareHeadline">—</div>
      <div class="wt-viewer-actions">
        <button class="wt-viewer-btn wt-viewer-back" id="wtCompareBack">← Back</button>
        <button class="wt-viewer-btn wt-viewer-close" id="wtCompareClose">Close</button>
        <button class="wt-viewer-btn wt-viewer-delete" id="wtCompareDelete">Delete</button>
      </div>
    </div>

  </div>

</div>

<script>
(function() {
  const WT_KEY    = 'po_coach_weights';
  const PHOTO_KEY = 'po_coach_photos';

  const $ = (id) => document.getElementById(id);
  function wtUnits() { return 'kg'; }

  // ============================================================
  // WEIGHT TRACKER
  // ============================================================
  function wtLoad() {
    try {
      const raw = localStorage.getItem(WT_KEY);
      const arr = raw ? JSON.parse(raw) : [];
      return Array.isArray(arr) ? arr.sort((a,b) => a.dateKey.localeCompare(b.dateKey)) : [];
    } catch (e) { return []; }
  }
  function wtSave(arr) {
    try { localStorage.setItem(WT_KEY, JSON.stringify(arr)); } catch (e) {}
  }
  function wtDateKey(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function wtParseKey(key) {
    const [y, m, d] = key.split('-').map(Number);
    return new Date(y, m - 1, d);
  }
  function wtSmoothPath(points) {
    if (!points.length) return '';
    if (points.length === 1) return 'M ' + points[0].x + ' ' + points[0].y;
    let d = 'M ' + points[0].x.toFixed(2) + ' ' + points[0].y.toFixed(2);
    for (let i = 1; i < points.length; i++) {
      const prev = points[i-1], curr = points[i];
      const cx = (prev.x + curr.x) / 2;
      d += ' Q ' + cx.toFixed(2) + ' ' + prev.y.toFixed(2) + ', ' + cx.toFixed(2) + ' ' + ((prev.y + curr.y)/2).toFixed(2);
      d += ' T ' + curr.x.toFixed(2) + ' ' + curr.y.toFixed(2);
    }
    return d;
  }

  let wtEntries = wtLoad();
  let wtRange = 'M';

  function wtGetRangeEntries() {
    const now = new Date();
    const cutoff = new Date(now);
    if (wtRange === 'W')      cutoff.setDate(cutoff.getDate() - 7);
    else if (wtRange === 'M') cutoff.setDate(cutoff.getDate() - 30);
    else                      cutoff.setFullYear(cutoff.getFullYear() - 1);
    const cutoffKey = wtDateKey(cutoff);
    return wtEntries.filter(e => e.dateKey >= cutoffKey);
  }

  function wtSaveEntry(weight) {
    const key = wtDateKey(new Date());
    const existing = wtEntries.find(e => e.dateKey === key);
    if (existing) existing.weight = weight;
    else { wtEntries.push({ dateKey: key, weight }); wtEntries.sort((a,b) => a.dateKey.localeCompare(b.dateKey)); }
    wtSave(wtEntries);
    wtRender();
  }

  function wtRender() {
    const last = wtEntries[wtEntries.length - 1] || null;
    const todayKey = wtDateKey(new Date());
    const todayEntry = wtEntries.find(e => e.dateKey === todayKey);
    const u = wtUnits();

    $('wtUnit').textContent = u;
    $('wtUnitStatic').textContent = u;
    $('wtNum').textContent = last ? last.weight.toFixed(1) : '—';

    if (todayEntry) {
      $('wtEmpty').classList.add('hidden');
      $('wtLockedValue').textContent = todayEntry.weight.toFixed(1) + ' ' + u;
      $('wtLocked').classList.remove('hidden');
      $('wtInputRow').classList.add('hidden');
    } else {
      if (wtEntries.length === 0) $('wtEmpty').classList.remove('hidden');
      else $('wtEmpty').classList.add('hidden');
      $('wtLocked').classList.add('hidden');
      $('wtInputRow').classList.remove('hidden');
      if (last && !$('wtInput').value) $('wtInput').value = last.weight.toFixed(1);
    }

    if (wtEntries.length >= 1) {
      $('wtRangeTabs').classList.remove('hidden');
      $('wtChartWrap').classList.remove('hidden');
      wtRenderChart();
    } else {
      $('wtRangeTabs').classList.add('hidden');
      $('wtChartWrap').classList.add('hidden');
      $('wtLegend').classList.add('hidden');
    }
    if (wtEntries.length >= 2) {
      wtRenderDelta();
    } else {
      $('wtDelta').classList.add('hidden');
    }
    wtRenderStreak();
  }

  function wtRenderStreak() {
    const el = $('wtStreak');
    let streak = 0;
    let cursor = new Date();
    if (!wtEntries.find(e => e.dateKey === wtDateKey(cursor))) {
      cursor.setDate(cursor.getDate() - 1);
    }
    while (wtEntries.find(e => e.dateKey === wtDateKey(cursor))) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    }
    if (streak >= 2) {
      $('wtStreakNum').textContent = streak + ' day streak';
      el.classList.remove('hidden');
    } else {
      el.classList.add('hidden');
    }
  }

  function wtRenderChart() {
    const recent = wtGetRangeEntries();
    const rangeLabel = wtRange === 'W' ? '7 days' : wtRange === 'M' ? '30 days' : '1 year';
    const avgWindow = wtRange === 'W' ? 3 : wtRange === 'M' ? 7 : 30;

    if (recent.length === 0) {
      $('wtChartContent').innerHTML = '<text x="160" y="65" text-anchor="middle" fill="rgba(255,255,255,0.18)" font-size="11" font-family="monospace">No entries in this period</text>';
      $('wtYAxisMax').textContent = '—';
      $('wtYAxisMin').textContent = '—';
      $('wtMeta').textContent = '0 entries · ' + rangeLabel;
      $('wtLegend').classList.add('hidden');
      return;
    }
    if (recent.length < 2) {
      const w = recent[0].weight;
      const cx = 160, cy = 65;
      $('wtChartContent').innerHTML = '<circle class="wt-dot-today" cx="' + cx + '" cy="' + cy + '" r="5"/>'
        + '<text x="' + cx + '" y="' + (cy - 14) + '" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11" font-family="monospace">' + w.toFixed(1) + ' kg</text>';
      $('wtYAxisMax').textContent = w.toFixed(1);
      $('wtYAxisMin').textContent = w.toFixed(1);
      $('wtMeta').textContent = '1 entry · ' + rangeLabel;
      $('wtLegend').classList.add('hidden');
      return;
    }
    $('wtLegend').classList.remove('hidden');

    const weights = recent.map(e => e.weight);
    const min = Math.min.apply(null, weights);
    const max = Math.max.apply(null, weights);
    const pad = Math.max((max - min) * 0.15, 0.5);
    const yMin = min - pad, yMax = max + pad;
    const xLeft = 8, xRight = 312, yTop = 20, yBot = 110;
    const xRange = xRight - xLeft, yRange = yBot - yTop;
    const xFor = (i) => recent.length === 1 ? xRight : xLeft + (i / (recent.length - 1)) * xRange;
    const yFor = (w) => yBot - ((w - yMin) / (yMax - yMin)) * yRange;
    const points = recent.map((e, i) => ({ x: xFor(i), y: yFor(e.weight) }));
    const linePath = wtSmoothPath(points);
    const areaPath = linePath + ' L ' + points[points.length - 1].x.toFixed(2) + ' ' + yBot + ' L ' + points[0].x.toFixed(2) + ' ' + yBot + ' Z';
    const avgPoints = recent.map((_, i) => {
      const start = Math.max(0, i - (avgWindow - 1));
      const win = recent.slice(start, i + 1);
      const avg = win.reduce((s, p) => s + p.weight, 0) / win.length;
      return { x: xFor(i), y: yFor(avg) };
    });
    const avgPath = wtSmoothPath(avgPoints);
    const showDots = recent.length <= 60;
    let html = '<path class="wt-avg-line" d="' + avgPath + '"></path>'
             + '<path class="wt-area" d="' + areaPath + '"></path>'
             + '<path class="wt-line" filter="url(#wtGlow)" d="' + linePath + '"></path>';
    if (showDots) {
      points.forEach((p, i) => {
        const cls = (i === points.length - 1) ? 'wt-dot-today' : 'wt-dot';
        const r = (i === points.length - 1) ? 5 : 3;
        html += '<circle class="' + cls + '" cx="' + p.x.toFixed(2) + '" cy="' + p.y.toFixed(2) + '" r="' + r + '"/>';
      });
    } else {
      const last = points[points.length - 1];
      html += '<circle class="wt-dot-today" cx="' + last.x.toFixed(2) + '" cy="' + last.y.toFixed(2) + '" r="5"/>';
    }
    $('wtChartContent').innerHTML = html;
    $('wtYAxisMax').textContent = yMax.toFixed(1);
    $('wtYAxisMin').textContent = yMin.toFixed(1);
    $('wtMeta').textContent = recent.length + ' ' + (recent.length === 1 ? 'entry' : 'entries') + ' · ' + rangeLabel;
  }

  function wtRenderDelta() {
    const last = wtEntries[wtEntries.length - 1];
    const lastDate = wtParseKey(last.dateKey);
    const cutoff = new Date(lastDate); cutoff.setDate(cutoff.getDate() - 7);
    const baseline = wtEntries.find(e => wtParseKey(e.dateKey) >= cutoff) || wtEntries[0];
    const diff = last.weight - baseline.weight;
    const el = $('wtDelta');
    if (Math.abs(diff) < 0.05) { el.classList.add('hidden'); return; }
    const arrow = diff > 0 ? '↑' : '↓';
    const sign = diff > 0 ? '+' : '−';
    el.textContent = arrow + ' ' + sign + Math.abs(diff).toFixed(1) + ' ' + wtUnits() + ' · last 7d';
    el.classList.toggle('up',   diff > 0);
    el.classList.toggle('down', diff < 0);
    el.classList.remove('hidden');
  }

  $('wtSaveBtn').addEventListener('click', () => {
    const v = parseFloat($('wtInput').value);
    if (isNaN(v) || v <= 0) return;
    wtSaveEntry(v);
  });
  $('wtInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $('wtSaveBtn').click();
  });
  $('wtEditBtn').addEventListener('click', () => {
    $('wtLocked').classList.add('hidden');
    $('wtInputRow').classList.remove('hidden');
    const todayEntry = wtEntries.find(e => e.dateKey === wtDateKey(new Date()));
    if (todayEntry) $('wtInput').value = todayEntry.weight.toFixed(1);
    $('wtInput').focus(); $('wtInput').select();
  });

  $('wtRangeTabs').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-range]');
    if (!btn) return;
    wtRange = btn.dataset.range;
    $('wtRangeTabs').querySelectorAll('.wt-range-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.range === wtRange);
    });
    wtRenderChart();
  });

  // ============================================================
  // PROGRESS PHOTOS
  // ============================================================
  let photos = [];
  try {
    const raw = localStorage.getItem(PHOTO_KEY);
    if (raw) photos = JSON.parse(raw);
  } catch (e) { photos = []; }

  function photosSave() {
    try {
      localStorage.setItem(PHOTO_KEY, JSON.stringify(photos));
      return true;
    } catch (e) {
      return false;
    }
  }
  function compressPhotoDataUrl(dataUrl, maxDim, quality) {
    maxDim = maxDim || 1080;
    quality = quality == null ? 0.75 : quality;
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        let w = img.naturalWidth || img.width;
        let h = img.naturalHeight || img.height;
        if (w > maxDim || h > maxDim) {
          if (w >= h) { h = Math.round(h * (maxDim / w)); w = maxDim; }
          else { w = Math.round(w * (maxDim / h)); h = maxDim; }
        }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        try { resolve(c.toDataURL('image/jpeg', quality)); }
        catch { resolve(dataUrl); }
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });
  }
  async function uploadPhotoToStorage(dataUrl) {
    if (!pcSupa) return null;
    try {
      const res = await fetch(dataUrl);
      const blob = await res.blob();
      const filename = 'photo_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10) + '.jpg';
      const { error } = await pcSupa.storage.from('progress-photos').upload(filename, blob, { contentType: 'image/jpeg', upsert: false });
      if (error) return null;
      const { data } = pcSupa.storage.from('progress-photos').getPublicUrl(filename);
      return data ? data.publicUrl : null;
    } catch (e) { return null; }
  }
  function photoFmtDate(key) {
    const d = wtParseKey(key);
    const mons = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return mons[d.getMonth()] + ' ' + d.getDate();
  }
  function photoCurrentWeight() {
    const last = wtEntries[wtEntries.length - 1];
    return last ? (last.weight.toFixed(1) + ' ' + wtUnits()) : '—';
  }
  function photosRender() {
    const grid = $('wtPhotoGrid');
    if (!photos.length) {
      grid.innerHTML = '<div class="wt-photo-empty">No photos yet · tap Take Photo to start</div>';
    } else {
      grid.innerHTML = photos.map(p =>
        '<button class="wt-photo-card" data-id="' + p.id + '" type="button">' +
          '<img src="' + (p.url || p.dataUrl) + '" alt="">' +
          '<div class="wt-photo-overlay"></div>' +
          '<div class="wt-photo-meta">' +
            '<span class="wt-photo-date">' + photoFmtDate(p.dateKey) + '</span>' +
            '<span class="wt-photo-weight">' + (p.weight || '—') + '</span>' +
          '</div>' +
        '</button>'
      ).join('');
      grid.querySelectorAll('.wt-photo-card').forEach(card => {
        card.addEventListener('click', () => openPhoto(card.dataset.id));
      });
    }
    if (!photos.length) $('wtProgressCount').textContent = '0 photos';
    else if (photos.length === 1) $('wtProgressCount').textContent = '1 photo · latest ' + photoFmtDate(photos[0].dateKey);
    else $('wtProgressCount').textContent = photos.length + ' photos · latest ' + photoFmtDate(photos[0].dateKey);
  }
  async function photosAdd(dataUrl) {
    let compressed = dataUrl;
    try { compressed = await compressPhotoDataUrl(dataUrl); } catch {}
    const id = 'p' + Date.now() + '_' + Math.floor(Math.random() * 999);
    const entry = { id, dataUrl: compressed, dateKey: wtDateKey(new Date()), weight: photoCurrentWeight() };
    photos.unshift(entry);
    if (!photosSave()) {
      try { entry.dataUrl = await compressPhotoDataUrl(dataUrl, 800, 0.6); } catch {}
      if (!photosSave()) {
        photos.shift();
        alert('Phone storage is full — delete some older progress photos before adding a new one.');
        return;
      }
    }
    photosRender();
    uploadPhotoToStorage(entry.dataUrl).then((url) => {
      if (!url) return;
      const e = photos.find(p => p.id === id);
      if (!e) return;
      e.url = url;
      delete e.dataUrl;
      photosSave();
      photosRender();
    });
  }
  function fileToPhoto(file) {
    const r = new FileReader();
    r.onload = (e) => photosAdd(e.target.result);
    r.readAsDataURL(file);
  }

  $('wtProgressLink').addEventListener('click', () => {
    photosRender();
    $('wtOverlay').classList.add('is-open');
    document.body.style.overflow = 'hidden';
  });
  $('wtBack').addEventListener('click', () => {
    $('wtOverlay').classList.remove('is-open');
    document.body.style.overflow = '';
  });

  let camStream = null;
  let camFacing = 'environment';
  async function openCam() {
    $('wtCam').classList.add('is-open');
    try {
      camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: camFacing } }, audio: false });
      $('wtCamVideo').srcObject = camStream;
    } catch (e) {
      try {
        camStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        $('wtCamVideo').srcObject = camStream;
      } catch (e2) {
        closeCam();
        alert('Camera unavailable. Use "From Library" instead.');
        throw e2;
      }
    }
  }
  function closeCam() {
    if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
    $('wtCamVideo').srcObject = null;
    $('wtCam').classList.remove('is-open');
  }
  $('wtTakePhotoBtn').addEventListener('click', async () => {
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      try { await openCam(); return; } catch (e) {}
    }
    $('wtFileCamera').click();
  });
  $('wtFileCamera').addEventListener('change', (e) => {
    const f = e.target.files && e.target.files[0];
    if (f) fileToPhoto(f);
    e.target.value = '';
  });
  $('wtFromLibraryBtn').addEventListener('click', () => $('wtFileLibrary').click());
  $('wtFileLibrary').addEventListener('change', (e) => {
    const f = e.target.files && e.target.files[0];
    if (f) fileToPhoto(f);
    e.target.value = '';
  });
  $('wtCamCancel').addEventListener('click', closeCam);
  $('wtCamFlip').addEventListener('click', async () => {
    camFacing = camFacing === 'environment' ? 'user' : 'environment';
    if (camStream) camStream.getTracks().forEach(t => t.stop());
    try { await openCam(); } catch (e) {}
  });
  $('wtCamShutter').addEventListener('click', () => {
    const video = $('wtCamVideo'), canvas = $('wtCamCanvas');
    if (!video.videoWidth) return;
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    closeCam();
    photosAdd(dataUrl);
  });

  let activePhotoId = null;
  let comparePhotoId = null;
  let pvDeleteConfirm = false;
  function openPhoto(id) {
    const p = photos.find(x => x.id === id);
    if (!p) return;
    activePhotoId = id;
    $('wtViewerImg').src = p.url || p.dataUrl;
    $('wtViewerDate').textContent = photoFmtDate(p.dateKey).toUpperCase();
    $('wtViewerWeight').textContent = p.weight || '—';
    $('wtViewer').dataset.mode = 'single';
    $('wtViewer').classList.add('is-open');
    pvDeleteConfirm = false;
    $('wtViewerDelete').textContent = 'Delete';
    $('wtViewerDelete').classList.remove('is-confirm');
    $('wtViewerCompare').disabled = photos.length < 2;
    $('wtViewerCompare').style.opacity = photos.length < 2 ? '0.4' : '';
  }
  function closePhoto() {
    $('wtViewer').classList.remove('is-open');
    $('wtViewer').dataset.mode = 'single';
    activePhotoId = null;
    comparePhotoId = null;
  }
  function parseWeightStr(w) {
    if (!w) return null;
    const m = String(w).match(/-?\d+(\.\d+)?/);
    return m ? parseFloat(m[0]) : null;
  }
  function fmtDelta(diff, units) {
    if (diff == null) return '';
    if (Math.abs(diff) < 0.05) return '· no change';
    const sign = diff > 0 ? '+' : '−';
    return '· ' + sign + Math.abs(diff).toFixed(1) + ' ' + units;
  }
  function defaultCompareFor(activeId) {
    const idx = photos.findIndex(p => p.id === activeId);
    if (idx === -1) return null;
    if (photos[idx + 1]) return photos[idx + 1].id;
    if (photos[idx - 1]) return photos[idx - 1].id;
    return null;
  }
  function openCompare(activeId, otherId) {
    const A = photos.find(p => p.id === activeId);
    const B = photos.find(p => p.id === otherId);
    if (!A || !B) return;
    activePhotoId = activeId;
    comparePhotoId = otherId;
    $('wtCmpImgA').src = A.url || A.dataUrl;
    $('wtCmpImgB').src = B.url || B.dataUrl;
    $('wtCmpMetaA').textContent = photoFmtDate(A.dateKey) + ' · ' + (A.weight || '—');
    $('wtCmpMetaB').textContent = photoFmtDate(B.dateKey) + ' · ' + (B.weight || '—');
    const wA = parseWeightStr(A.weight);
    const wB = parseWeightStr(B.weight);
    const headEl = $('wtCompareHeadline');
    let cls = 'flat', headline = photoFmtDate(A.dateKey) + ' → ' + photoFmtDate(B.dateKey);
    if (wA != null && wB != null) {
      const diff = wA - wB;
      headline += ' ' + fmtDelta(diff, wtUnits());
      if (Math.abs(diff) < 0.05) cls = 'flat';
      else if (diff > 0) cls = 'up';
      else cls = 'down';
    }
    headEl.textContent = headline;
    headEl.className = 'wt-compare-headline ' + cls;
    $('wtViewer').dataset.mode = 'compare';
    $('wtViewer').classList.add('is-open');
    pvDeleteConfirm = false;
    $('wtCompareDelete').textContent = 'Delete';
    $('wtCompareDelete').classList.remove('is-confirm');
  }
  function cycleCompareTarget() {
    if (!activePhotoId) return;
    const others = photos.filter(p => p.id !== activePhotoId);
    if (!others.length) return;
    const curIdx = others.findIndex(p => p.id === comparePhotoId);
    const nextIdx = (curIdx + 1) % others.length;
    openCompare(activePhotoId, others[nextIdx].id);
  }
  function deleteActivePhoto(deleteBtn) {
    if (!activePhotoId) return;
    if (!pvDeleteConfirm) {
      pvDeleteConfirm = true;
      deleteBtn.textContent = 'Confirm delete?';
      deleteBtn.classList.add('is-confirm');
      setTimeout(() => {
        pvDeleteConfirm = false;
        deleteBtn.textContent = 'Delete';
        deleteBtn.classList.remove('is-confirm');
      }, 3000);
      return;
    }
    photos = photos.filter(p => p.id !== activePhotoId);
    photosSave();
    photosRender();
    closePhoto();
  }

  $('wtViewerClose').addEventListener('click', closePhoto);
  $('wtCompareClose').addEventListener('click', closePhoto);
  $('wtViewerDelete').addEventListener('click', () => deleteActivePhoto($('wtViewerDelete')));
  $('wtCompareDelete').addEventListener('click', () => deleteActivePhoto($('wtCompareDelete')));
  $('wtViewerCompare').addEventListener('click', () => {
    if (!activePhotoId) return;
    const otherId = defaultCompareFor(activePhotoId);
    if (!otherId) { alert('Need at least one other photo to compare.'); return; }
    openCompare(activePhotoId, otherId);
  });
  $('wtCompareBack').addEventListener('click', () => {
    if (activePhotoId) $('wtViewer').dataset.mode = 'single';
    else closePhoto();
  });
  $('wtCmpSideB').addEventListener('click', cycleCompareTarget);

  // ============================================================
  // PERSONAL BESTS
  // ============================================================
  const PB_KEY = 'fitness_pb_records';

  function pbLoad() {
    try { return JSON.parse(localStorage.getItem(PB_KEY)) || []; } catch { return []; }
  }
  function pbSave(records) {
    try { localStorage.setItem(PB_KEY, JSON.stringify(records)); } catch {}
  }
  function brzyckiOrm(weight, reps) {
    if (reps < 2 || reps >= 37) return null;
    return weight * (36 / (37 - reps));
  }
  function pbEscHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function pbRender() {
    const records = pbLoad();
    const list = $('pbList');
    if (!records.length) {
      $('pbEmpty').classList.remove('hidden');
      list.classList.add('hidden');
      list.innerHTML = '';
      return;
    }
    $('pbEmpty').classList.add('hidden');
    list.classList.remove('hidden');
    list.innerHTML = records.map(r => {
      const orm = brzyckiOrm(r.weight, r.reps);
      const ormHtml = orm != null
        ? '<div class="pb-orm">~' + orm.toFixed(1) + ' kg 1RM</div>'
        : '';
      return '<div class="pb-row">' +
        '<div class="pb-row-info">' +
          '<div class="pb-exercise">' + pbEscHtml(r.exercise) + '</div>' +
          '<div class="pb-lift">' + r.weight + ' kg &times; ' + r.reps + ' rep' + (r.reps !== 1 ? 's' : '') + '</div>' +
        '</div>' +
        ormHtml +
        '<button class="pb-delete" data-id="' + r.id + '" aria-label="Delete">✕</button>' +
      '</div>';
    }).join('');
    list.querySelectorAll('.pb-delete').forEach(btn => {
      btn.addEventListener('click', () => {
        pbSave(pbLoad().filter(r => r.id !== btn.dataset.id));
        pbRender();
      });
    });
  }

  function pbOpenModal() {
    $('pbExercise').value = '';
    $('pbWeight').value = '';
    $('pbReps').value = '';
    $('pbModalBg').classList.add('is-open');
    setTimeout(() => $('pbExercise').focus(), 60);
  }
  function pbCloseModal() {
    $('pbModalBg').classList.remove('is-open');
  }
  function pbSaveRecord() {
    const exercise = $('pbExercise').value.trim();
    const weight = parseFloat($('pbWeight').value);
    const reps = parseInt($('pbReps').value, 10);
    if (!exercise)                  { $('pbExercise').focus(); return; }
    if (isNaN(weight) || weight <= 0) { $('pbWeight').focus();  return; }
    if (isNaN(reps) || reps < 1)    { $('pbReps').focus();    return; }
    const records = pbLoad();
    records.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      exercise, weight, reps,
      date: wtDateKey(new Date())
    });
    pbSave(records);
    pbRender();
    pbCloseModal();
  }

  $('pbAddBtn').addEventListener('click', pbOpenModal);
  $('pbModalCancel').addEventListener('click', pbCloseModal);
  $('pbModalSave').addEventListener('click', pbSaveRecord);
  $('pbModalBg').addEventListener('click', (e) => { if (e.target === $('pbModalBg')) pbCloseModal(); });
  [$('pbExercise'), $('pbWeight'), $('pbReps')].forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') pbSaveRecord();
      if (e.key === 'Escape') pbCloseModal();
    });
  });

  // ============================================================
  // BOOT
  // ============================================================
  wtRender();
  photosRender();
  pbRender();

  // ============================================================
  // CLOUD SYNC via Supabase
  // ============================================================
  const SUPABASE_URL = 'PASTE-YOUR-SUPABASE-PROJECT-URL-HERE';
  const SUPABASE_KEY = 'PASTE-YOUR-SUPABASE-PUBLISHABLE-KEY-HERE';
  const APP_KEY = 'po-coach';
  const PC_SYNCED_KEYS = ['po_coach_weights', 'po_coach_photos', 'fitness_pb_records'];

  let pcSupa = null;
  let pcPushTimer = null;
  let pcSuppressSync = false;
  let pcPendingRemote = null;
  let pcLastSyncedJson = null;

  const _pcOrigSet = localStorage.setItem.bind(localStorage);
  const _pcOrigRemove = localStorage.removeItem.bind(localStorage);
  localStorage.setItem = function(k, v) {
    _pcOrigSet(k, v);
    try {
      if (!pcSuppressSync && PC_SYNCED_KEYS.indexOf(k) !== -1) pcSchedulePush();
    } catch (e) {}
  };
  localStorage.removeItem = function(k) {
    _pcOrigRemove(k);
    try {
      if (!pcSuppressSync && PC_SYNCED_KEYS.indexOf(k) !== -1) pcSchedulePush();
    } catch (e) {}
  };

  function pcCollectState() {
    const out = {};
    for (const k of PC_SYNCED_KEYS) {
      const v = localStorage.getItem(k);
      if (v == null) continue;
      let val;
      try { val = JSON.parse(v); } catch { continue; }
      if (k === 'po_coach_photos' && Array.isArray(val)) {
        val = val.filter((p) => p && p.url).map((p) => ({ id: p.id, url: p.url, dateKey: p.dateKey, weight: p.weight }));
      }
      out[k] = val;
    }
    return out;
  }

  function pcIsUserEditing() {
    const ae = document.activeElement;
    if (!ae) return false;
    const tag = ae.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return true;
    if (ae.getAttribute && ae.getAttribute('contenteditable') === 'true') return true;
    return false;
  }

  function pcRerender() {
    try { wtEntries = wtLoad(); } catch {}
    try {
      const raw = localStorage.getItem(PHOTO_KEY);
      photos = raw ? JSON.parse(raw) : [];
    } catch { photos = []; }
    try { wtRender(); } catch {}
    try { photosRender(); } catch {}
  }

  function pcApplyRemoteState(remote) {
    if (!remote || typeof remote !== 'object') return false;
    pcSuppressSync = true;
    let changed = false;
    try {
      for (const k of PC_SYNCED_KEYS) {
        if (k === 'po_coach_photos') {
          let localPhotos = [];
          try { localPhotos = JSON.parse(localStorage.getItem(k) || '[]'); } catch {}
          const remotePhotos = Array.isArray(remote[k]) ? remote[k] : [];
          const remoteIds = new Set(remotePhotos.map((p) => p && p.id));
          const localOnly = localPhotos.filter((p) => p && !p.url && !remoteIds.has(p.id));
          const merged = [...remotePhotos, ...localOnly];
          const incoming = JSON.stringify(merged);
          if (localStorage.getItem(k) !== incoming) {
            try { _pcOrigSet(k, incoming); changed = true; } catch {}
          }
          continue;
        }
        if (k in remote) {
          const incoming = JSON.stringify(remote[k]);
          const local = localStorage.getItem(k);
          if (local !== incoming) { try { _pcOrigSet(k, incoming); changed = true; } catch {} }
        } else if (localStorage.getItem(k) != null) {
          try { _pcOrigRemove(k); changed = true; } catch {}
        }
      }
    } finally {
      pcSuppressSync = false;
    }
    if (changed) { try { pcRerender(); } catch (e) {} }
    return changed;
  }

  function pcMaybeApplyRemote(remote) {
    if (pcIsUserEditing()) { pcPendingRemote = remote; return; }
    pcApplyRemoteState(remote);
  }

  function pcApplyPendingIfReady() {
    if (pcPendingRemote && !pcIsUserEditing()) {
      const r = pcPendingRemote;
      pcPendingRemote = null;
      pcApplyRemoteState(r);
    }
  }

  async function pcPushNow() {
    if (!pcSupa) return;
    const state = pcCollectState();
    const json = JSON.stringify(state);
    if (json === pcLastSyncedJson) return;
    try {
      const { error } = await pcSupa.from('app_state').upsert(
        { key: APP_KEY, data: state, updated_at: new Date().toISOString() },
        { onConflict: 'key' }
      );
      if (!error) pcLastSyncedJson = json;
    } catch (_) {}
  }

  function pcSchedulePush() {
    if (pcSuppressSync) return;
    clearTimeout(pcPushTimer);
    pcPushTimer = setTimeout(pcPushNow, 250);
  }

  function pcFlushPushOnUnload() {
    if (!pcSupa) return;
    const state = pcCollectState();
    const json = JSON.stringify(state);
    if (json === pcLastSyncedJson) return;
    try {
      fetch(SUPABASE_URL + '/rest/v1/app_state?on_conflict=key', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify({ key: APP_KEY, data: state, updated_at: new Date().toISOString() }),
        keepalive: true,
      }).catch(() => {});
      pcLastSyncedJson = json;
    } catch (_) {}
  }

  (async function pcInitCloudSync() {
    if (!window.supabase || !SUPABASE_URL || !SUPABASE_KEY) return;
    if (SUPABASE_URL.indexOf('PASTE-') === 0 || SUPABASE_KEY.indexOf('PASTE-') === 0) return;
    pcSupa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    try {
      const { data, error } = await pcSupa.from('app_state').select('data').eq('key', APP_KEY).maybeSingle();
      if (!error && data && data.data && Object.keys(data.data).length > 0) {
        pcLastSyncedJson = JSON.stringify(data.data);
        pcMaybeApplyRemote(data.data);
      } else if (Object.keys(pcCollectState()).length > 0) {
        pcSchedulePush();
      }
    } catch (_) {}
    pcSupa.channel('app_state_' + APP_KEY)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'app_state', filter: 'key=eq.' + APP_KEY }, (payload) => {
        if (!payload.new || !payload.new.data) return;
        const incoming = JSON.stringify(payload.new.data);
        if (incoming === pcLastSyncedJson) return;
        pcLastSyncedJson = incoming;
        pcMaybeApplyRemote(payload.new.data);
      })
      .subscribe();
  })();

  document.addEventListener('focusout', () => { setTimeout(pcApplyPendingIfReady, 0); }, true);
  window.addEventListener('pagehide', pcFlushPushOnUnload);
  window.addEventListener('beforeunload', pcFlushPushOnUnload);
  document.addEventListener('visibilitychange', () => { if (document.hidden) pcFlushPushOnUnload(); });
})();
</script>

</body>
