<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<title>Books</title>
<script src="topbar.js" defer></script>

<style>
:root {
  --bg: #0a0a0b;
  --bg-card: #111113;
  --text-1: #ffffff;
  --text-2: rgba(255,255,255,0.6);
  --text-3: rgba(255,255,255,0.4);
  --text-4: rgba(255,255,255,0.25);
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.14);
  --good: #6ee7b7;
  --warn: #fbbf24;
  --bad: #ff8a8a;
  --book: #a78bfa;
  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  --font-mono: ui-monospace, SF Mono, Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, #11101a 0%, #0a0a0b 60%);
  color: var(--text-1);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  min-height: 100vh;
  overflow-x: hidden;
}
.books-shell {
  width: 100%; max-width: min(720px, 100vw);
  margin: 0 auto;
  padding: 24px max(16px, env(safe-area-inset-right)) calc(40px + env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
  box-sizing: border-box;
}

/* Divider */
.bk-divider {
  display: flex; align-items: center; gap: 16px; margin-bottom: 14px;
}
.bk-divider::before, .bk-divider::after {
  content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.10);
}
.bk-divider span {
  font-size: 11px; letter-spacing: 0.22em; font-weight: 600;
  color: rgba(255,255,255,0.85);
}

/* Stats */
.bk-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  margin-bottom: 14px;
}
.bk-stat {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 10px;
  text-align: center;
}
.bk-stat-num {
  font-size: 30px; font-weight: 700; line-height: 1;
  font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
  margin-bottom: 5px;
}
.bk-stat-label {
  font-size: 9px; letter-spacing: 0.14em; font-weight: 600;
  color: var(--text-3); text-transform: uppercase;
}
.bk-stat.tbr     .bk-stat-num { color: var(--warn); }
.bk-stat.reading .bk-stat-num { color: #60a5fa; }
.bk-stat.read    .bk-stat-num { color: var(--good); }
.bk-stat.want    .bk-stat-num { color: var(--book); }

/* Book list */
.bk-card {
  background: var(--bg-card);
  border: 1px solid rgba(167,139,250,0.10);
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 22px;
}
.bk-empty {
  text-align: center; padding: 32px 16px;
  color: var(--text-3); font-size: 13px;
}
.bk-list { padding: 4px 0 0; }
.bk-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.bk-row:last-child { border-bottom: none; }
.bk-icon { font-size: 24px; line-height: 1; flex-shrink: 0; margin-top: 2px; }
.bk-info { flex: 1; min-width: 0; }
.bk-title {
  font-size: 14px; font-weight: 600; color: var(--text-1);
  margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bk-author {
  font-size: 12px; color: var(--text-3); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bk-tags { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.bk-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 0.10em;
  padding: 2px 7px; border-radius: 5px;
  text-transform: uppercase; white-space: nowrap;
}
.bk-badge.tbr     { background: rgba(251,191,36,0.14);  color: var(--warn); }
.bk-badge.reading { background: rgba(96,165,250,0.14);  color: #60a5fa; }
.bk-badge.read    { background: rgba(110,231,183,0.14); color: var(--good); }
.bk-badge.want    { background: rgba(167,139,250,0.14); color: var(--book); }
.bk-genre  { font-size: 11px; color: var(--text-4); }
.bk-pages  { font-size: 11px; color: var(--text-4); font-variant-numeric: tabular-nums; }
.bk-delete {
  background: transparent; border: none;
  color: var(--text-4); cursor: pointer;
  padding: 4px; border-radius: 6px; font-size: 13px; line-height: 1;
  flex-shrink: 0; margin-top: 2px;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s;
}
.bk-delete:hover { color: var(--bad); }
.bk-add-btn {
  display: block; width: 100%; padding: 14px;
  background: transparent; border: none;
  border-top: 1px solid var(--border);
  color: var(--text-3); font-family: inherit;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.14s, color 0.14s;
}
.bk-add-btn:hover { background: rgba(255,255,255,0.03); color: var(--text-2); }

/* Filters */
.bk-filters { margin-bottom: 10px; }
.bk-filter-status {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 2px; margin-bottom: 8px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.bk-filter-status::-webkit-scrollbar { display: none; }
.bk-filter-pill {
  flex-shrink: 0;
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-3); font-family: inherit;
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.bk-filter-pill:hover { border-color: var(--border-strong); color: var(--text-2); }
.bk-filter-pill.active-all     { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.22); color: var(--text-1); }
.bk-filter-pill.active-tbr     { background: rgba(251,191,36,0.12);  border-color: rgba(251,191,36,0.40);  color: var(--warn); }
.bk-filter-pill.active-reading { background: rgba(96,165,250,0.12);  border-color: rgba(96,165,250,0.40);  color: #60a5fa; }
.bk-filter-pill.active-read    { background: rgba(110,231,183,0.12); border-color: rgba(110,231,183,0.40); color: var(--good); }
.bk-filter-pill.active-want    { background: rgba(167,139,250,0.12); border-color: rgba(167,139,250,0.40); color: var(--book); }
.bk-filter-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.bk-filter-select, .bk-filter-input {
  width: 100%; padding: 9px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px; color: var(--text-1);
  font-family: inherit; font-size: 13px; outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none; appearance: none;
}
.bk-filter-select { padding-right: 28px; }
.bk-filter-select:focus, .bk-filter-input:focus { border-color: rgba(167,139,250,0.45); }
.bk-filter-input::placeholder { color: var(--text-4); }
.bk-filter-select option { background: #111113; color: #fff; }
.bk-filter-select-wrap { position: relative; }
.bk-filter-select-wrap::after {
  content: '▾'; position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%); pointer-events: none;
  color: var(--text-3); font-size: 11px;
}
.bk-no-results {
  text-align: center; padding: 24px 16px;
  color: var(--text-4); font-size: 13px;
}

/* Modal */
.bk-modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.72); backdrop-filter: blur(10px);
  z-index: 150; align-items: center; justify-content: center; padding: 24px;
}
.bk-modal-bg.is-open { display: flex; }
.bk-modal {
  width: 100%; max-width: 400px;
  background: #111113;
  border: 1px solid var(--border-strong);
  border-radius: 18px; padding: 24px;
  max-height: 92vh; overflow-y: auto;
}
.bk-modal-title {
  font-size: 18px; font-weight: 700; color: var(--text-1); margin-bottom: 20px;
}
.bk-field { margin-bottom: 14px; }
.bk-label {
  display: block; font-size: 10px; letter-spacing: 0.18em;
  font-weight: 600; color: var(--text-3); margin-bottom: 6px;
}
.bk-input, .bk-select {
  width: 100%; padding: 11px 13px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px; color: var(--text-1);
  font-family: inherit; font-size: 15px; outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none; appearance: none;
}
.bk-input:focus, .bk-select:focus { border-color: rgba(167,139,250,0.50); }
.bk-input::placeholder { color: var(--text-4); }
.bk-select-wrap { position: relative; }
.bk-select-wrap::after {
  content: '▾'; position: absolute; right: 13px; top: 50%;
  transform: translateY(-50%); pointer-events: none;
  color: var(--text-3); font-size: 12px;
}
.bk-select option { background: #111113; color: #fff; }
.bk-modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.bk-modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.bk-modal-cancel {
  flex: 1; padding: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text-1); font-family: inherit;
  font-size: 14px; font-weight: 600; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.14s;
}
.bk-modal-cancel:hover { background: rgba(255,255,255,0.08); }
.bk-modal-save {
  flex: 1; padding: 12px;
  background: rgba(167,139,250,0.14);
  border: 1px solid rgba(167,139,250,0.36); border-radius: 10px;
  color: var(--book); font-family: inherit;
  font-size: 14px; font-weight: 700; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.14s;
}
.bk-modal-save:hover { background: rgba(167,139,250,0.24); }

@media (max-width: 480px) {
  .books-shell { padding: 14px max(10px, env(safe-area-inset-right)) calc(32px + env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left)); }
  .bk-modal-bg { padding: 0; align-items: flex-end; justify-content: stretch; }
  .bk-modal { max-width: 100%; border-radius: 18px 18px 0 0; padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
  .bk-modal-row { grid-template-columns: 1fr; }
  .bk-stats { grid-template-columns: repeat(2, 1fr); }
}
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="books-shell">

  <div class="bk-divider"><span>LIBRARY</span></div>

  <!-- Stats summary -->
  <div class="bk-stats">
    <div class="bk-stat tbr">
      <div class="bk-stat-num" id="bkCountTbr">0</div>
      <div class="bk-stat-label">To Read</div>
    </div>
    <div class="bk-stat reading">
      <div class="bk-stat-num" id="bkCountReading">0</div>
      <div class="bk-stat-label">Reading</div>
    </div>
    <div class="bk-stat read">
      <div class="bk-stat-num" id="bkCountRead">0</div>
      <div class="bk-stat-label">Read</div>
    </div>
    <div class="bk-stat want">
      <div class="bk-stat-num" id="bkCountWant">0</div>
      <div class="bk-stat-label">Want</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="bk-filters">
    <div class="bk-filter-status" id="bkFilterStatus">
      <button class="bk-filter-pill active-all" data-status="">All</button>
      <button class="bk-filter-pill" data-status="To Be Read">To Read</button>
      <button class="bk-filter-pill" data-status="In Progress">Reading</button>
      <button class="bk-filter-pill" data-status="Read">Read</button>
      <button class="bk-filter-pill" data-status="Want to Buy">Want</button>
    </div>
    <div class="bk-filter-row">
      <div class="bk-filter-select-wrap">
        <select id="bkFilterGenre" class="bk-filter-select">
          <option value="">All Genres</option>
          <option value="Fiction">Fiction</option>
          <option value="Non-Fiction">Non-Fiction</option>
          <option value="Fantasy">Fantasy</option>
          <option value="Science Fiction">Science Fiction</option>
          <option value="Mystery">Mystery</option>
          <option value="Thriller">Thriller</option>
          <option value="Romance">Romance</option>
          <option value="Biography">Biography</option>
          <option value="Self-Help">Self-Help</option>
          <option value="History">History</option>
          <option value="Horror">Horror</option>
          <option value="Classic">Classic</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <input type="text" id="bkFilterAuthor" class="bk-filter-input" placeholder="Search author…" autocomplete="off">
    </div>
  </div>

  <!-- Book list -->
  <div class="bk-card">
    <div class="bk-empty" id="bkEmpty">No books yet — tap Add Book to start your library</div>
    <div class="bk-list hidden" id="bkList"></div>
    <button class="bk-add-btn" id="bkAddBtn" type="button">+ Add Book</button>
  </div>

</div>

<!-- Add Book Modal -->
<div class="bk-modal-bg" id="bkModalBg">
  <div class="bk-modal">
    <div class="bk-modal-title">Add Book</div>

    <div class="bk-field">
      <label class="bk-label" for="bkTitle">BOOK NAME</label>
      <input type="text" id="bkTitle" class="bk-input" placeholder="e.g. Dune" autocomplete="off" spellcheck="false">
    </div>

    <div class="bk-field">
      <label class="bk-label" for="bkAuthor">AUTHOR</label>
      <input type="text" id="bkAuthor" class="bk-input" placeholder="e.g. Frank Herbert" autocomplete="off">
    </div>

    <div class="bk-modal-row">
      <div class="bk-field">
        <label class="bk-label" for="bkPages">TOTAL PAGES</label>
        <input type="number" id="bkPages" class="bk-input" placeholder="412" inputmode="numeric" min="1">
      </div>
      <div class="bk-field">
        <label class="bk-label" for="bkStatus">STATUS</label>
        <div class="bk-select-wrap">
          <select id="bkStatus" class="bk-select">
            <option value="To Be Read">To Be Read</option>
            <option value="In Progress">In Progress</option>
            <option value="Read">Read</option>
            <option value="Want to Buy">Want to Buy</option>
          </select>
        </div>
      </div>
    </div>

    <div class="bk-field">
      <label class="bk-label" for="bkGenre">GENRE</label>
      <div class="bk-select-wrap">
        <select id="bkGenre" class="bk-select">
          <option value="Fiction">Fiction</option>
          <option value="Non-Fiction">Non-Fiction</option>
          <option value="Fantasy">Fantasy</option>
          <option value="Science Fiction">Science Fiction</option>
          <option value="Mystery">Mystery</option>
          <option value="Thriller">Thriller</option>
          <option value="Romance">Romance</option>
          <option value="Biography">Biography</option>
          <option value="Self-Help">Self-Help</option>
          <option value="History">History</option>
          <option value="Horror">Horror</option>
          <option value="Classic">Classic</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <div class="bk-modal-actions">
      <button class="bk-modal-cancel" id="bkModalCancel" type="button">Cancel</button>
      <button class="bk-modal-save" id="bkModalSave" type="button">Save</button>
    </div>
  </div>
</div>

<script>
(function () {
  const BK_KEY = 'books_library';
  const $ = (id) => document.getElementById(id);

  const STATUS_CLASS = {
    'To Be Read':  'tbr',
    'In Progress': 'reading',
    'Read':        'read',
    'Want to Buy': 'want',
  };
  const PILL_ACTIVE = {
    '':            'active-all',
    'To Be Read':  'active-tbr',
    'In Progress': 'active-reading',
    'Read':        'active-read',
    'Want to Buy': 'active-want',
  };
  const ICONS = ['📖','📚','📕','📗','📘','📙'];

  let bkFilterStatus = '';
  let bkFilterGenre  = '';
  let bkFilterAuthor = '';

  function bkLoad() {
    try { return JSON.parse(localStorage.getItem(BK_KEY)) || []; } catch { return []; }
  }
  function bkSave(books) {
    try { localStorage.setItem(BK_KEY, JSON.stringify(books)); } catch {}
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function dateKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function pickIcon(title) {
    let h = 0;
    for (let i = 0; i < title.length; i++) h = (h * 31 + title.charCodeAt(i)) >>> 0;
    return ICONS[h % ICONS.length];
  }

  function bkRender() {
    const books = bkLoad();

    // Counts
    const c = { 'To Be Read': 0, 'In Progress': 0, 'Read': 0, 'Want to Buy': 0 };
    books.forEach(b => { if (c[b.status] != null) c[b.status]++; });
    $('bkCountTbr').textContent     = c['To Be Read'];
    $('bkCountReading').textContent = c['In Progress'];
    $('bkCountRead').textContent    = c['Read'];
    $('bkCountWant').textContent    = c['Want to Buy'];

    // List — apply filters
    const needle = bkFilterAuthor.toLowerCase().trim();
    const visible = books.filter(b => {
      if (bkFilterStatus && b.status !== bkFilterStatus) return false;
      if (bkFilterGenre  && b.genre  !== bkFilterGenre)  return false;
      if (needle && !(b.author || '').toLowerCase().includes(needle)) return false;
      return true;
    });

    const list = $('bkList');
    if (!books.length) {
      $('bkEmpty').classList.remove('hidden');
      list.classList.add('hidden');
      list.innerHTML = '';
      return;
    }
    $('bkEmpty').classList.add('hidden');
    if (!visible.length) {
      list.classList.remove('hidden');
      list.innerHTML = '<div class="bk-no-results">No books match this filter</div>';
      return;
    }
    list.classList.remove('hidden');
    list.innerHTML = visible.map(b => {
      const cls = STATUS_CLASS[b.status] || 'tbr';
      const icon = pickIcon(b.title);
      return '<div class="bk-row">' +
        '<span class="bk-icon">' + icon + '</span>' +
        '<div class="bk-info">' +
          '<div class="bk-title">' + esc(b.title) + '</div>' +
          '<div class="bk-author">' + esc(b.author || '—') + '</div>' +
          '<div class="bk-tags">' +
            '<span class="bk-badge ' + cls + '">' + esc(b.status) + '</span>' +
            (b.genre  ? '<span class="bk-genre">' + esc(b.genre) + '</span>' : '') +
            (b.pages  ? '<span class="bk-pages">· ' + b.pages + ' pages</span>' : '') +
          '</div>' +
        '</div>' +
        '<button class="bk-delete" data-id="' + b.id + '" aria-label="Delete">✕</button>' +
      '</div>';
    }).join('');

    list.querySelectorAll('.bk-delete').forEach(btn => {
      btn.addEventListener('click', () => {
        bkSave(bkLoad().filter(b => b.id !== btn.dataset.id));
        bkRender();
      });
    });
  }

  function openModal() {
    $('bkTitle').value  = '';
    $('bkAuthor').value = '';
    $('bkPages').value  = '';
    $('bkStatus').value = 'To Be Read';
    $('bkGenre').value  = 'Fiction';
    $('bkModalBg').classList.add('is-open');
    setTimeout(() => $('bkTitle').focus(), 60);
  }
  function closeModal() {
    $('bkModalBg').classList.remove('is-open');
  }
  function saveBook() {
    const title  = $('bkTitle').value.trim();
    const author = $('bkAuthor').value.trim();
    const pages  = parseInt($('bkPages').value, 10);
    const status = $('bkStatus').value;
    const genre  = $('bkGenre').value;
    if (!title) { $('bkTitle').focus(); return; }
    const books = bkLoad();
    books.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      title, author,
      pages: isNaN(pages) || pages < 1 ? null : pages,
      status, genre,
      dateAdded: dateKey(),
    });
    bkSave(books);
    bkRender();
    closeModal();
  }

  $('bkAddBtn').addEventListener('click', openModal);
  $('bkModalCancel').addEventListener('click', closeModal);
  $('bkModalSave').addEventListener('click', saveBook);
  $('bkModalBg').addEventListener('click', (e) => { if (e.target === $('bkModalBg')) closeModal(); });
  [$('bkTitle'), $('bkAuthor'), $('bkPages')].forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveBook();
      if (e.key === 'Escape') closeModal();
    });
  });

  // Status pill filters
  $('bkFilterStatus').addEventListener('click', (e) => {
    const pill = e.target.closest('[data-status]');
    if (!pill) return;
    bkFilterStatus = pill.dataset.status;
    $('bkFilterStatus').querySelectorAll('.bk-filter-pill').forEach(p => {
      p.className = 'bk-filter-pill';
      if (p.dataset.status === bkFilterStatus) p.classList.add(PILL_ACTIVE[bkFilterStatus]);
    });
    bkRender();
  });

  // Genre filter
  $('bkFilterGenre').addEventListener('change', () => {
    bkFilterGenre = $('bkFilterGenre').value;
    bkRender();
  });

  // Author search
  let bkAuthorTimer;
  $('bkFilterAuthor').addEventListener('input', () => {
    clearTimeout(bkAuthorTimer);
    bkAuthorTimer = setTimeout(() => {
      bkFilterAuthor = $('bkFilterAuthor').value;
      bkRender();
    }, 200);
  });

  bkRender();
})();
</script>

</body>
</html>
